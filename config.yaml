gateway:
  ip: "192.168.1.100"
  netmask: "255.255.255.0"
  gateway: "192.168.1.1"
  dns: "8.8.8.8"
  dhcp: true

serial:
  ports:
    - id: "serial1"
      name: "COM1"
      port: "/dev/ttyS0"
      baud_rate: 9600
      data_bits: 8
      parity: "none"
      stop_bits: 1
      flow_control: "none"
      delay_packaging: 10
      delay_timeout: 100
      protocol: "raw"
      enabled: false

channels: []

system:
  web_port: 8080
  log_level: "info"
  log_file: "logs/app.log"
  log_max_size: 10
  log_max_backups: 5
  password: "admin"
  oem:
    name: "Serial Server"
    logo: ""
    theme_color: "#409EFF"
  wifi:
    ssid: ""
    password: ""
    enabled: false
  module_4g:
    apn: ""
    enabled: false
